<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FlexLink ⚡ - Show Off Your Socials</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#a78bfa;--border:rgba(255,255,255,0.15);--card:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.55)}
body{font-family:'DM Sans',sans-serif;min-height:100vh;color:var(--text);overflow-x:hidden}
#bg-layer{position:fixed;inset:0;z-index:0;background:#0d0d1a;background-size:cover;background-position:center;transition:background 0.6s}
#bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,0.45)}
#app{position:relative;z-index:2}
.screen{display:none;min-height:100vh;padding:1.5rem 1rem 3rem;max-width:480px;margin:0 auto}
.screen.active{display:block}
.glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:1.25rem}
.logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#f472b6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.field input,.field textarea,.field select{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 13px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border 0.2s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:#1a0d3a;color:#fff}
.btn{width:100%;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:12px;padding:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s,transform 0.15s}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn:active{transform:scale(0.98)}
.btn-outline{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);background-image:none}
.btn-outline:hover{background:rgba(255,255,255,0.15)}
.btn-sm{width:auto;padding:7px 16px;font-size:13px;border-radius:10px}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);background-image:none}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.back-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
.edit-btn{background:rgba(167,139,250,0.2);border:1px solid var(--accent);color:#fff;border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.avatar{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;border:3px solid rgba(255,255,255,0.25);margin:0 auto 1rem;position:relative;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pv-name{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;text-align:center}
.pv-bio{font-size:13px;color:var(--muted);text-align:center;margin:4px 0 1.5rem;line-height:1.5}
.link-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;text-decoration:none;font-size:15px;font-weight:500;transition:transform 0.15s,background 0.15s;margin-bottom:10px;backdrop-filter:blur(10px)}
.link-btn:hover{background:rgba(255,255,255,0.16);transform:translateY(-2px)}
.icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.like-row{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:1rem}
.like-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:30px;padding:9px 20px;font-size:15px;cursor:pointer;transition:background 0.15s,transform 0.15s;font-family:'DM Sans',sans-serif}
.like-btn:hover{background:rgba(255,60,100,0.3);transform:scale(1.05)}
.like-btn.liked{opacity:0.6;cursor:default}
.share-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:30px;padding:9px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.profiles-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem}
.profile-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:1rem;text-align:center;cursor:pointer;transition:transform 0.2s,border-color 0.2s;backdrop-filter:blur(10px)}
.profile-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.mini-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 8px;overflow:hidden;position:relative}
.mini-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pname{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.pbio{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
.color-dot.sel{transform:scale(1.25);border-color:#fff}
.wallpaper-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.wp-thumb{width:100%;aspect-ratio:16/9;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:transform 0.15s,border-color 0.15s;object-fit:cover;background-size:cover;background-position:center}
.wp-thumb.sel{border-color:var(--accent);transform:scale(1.05)}
.wp-thumb.wp-upload{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:2px dashed rgba(255,255,255,0.25);flex-direction:column;gap:4px;font-size:11px;color:var(--muted)}
.link-editor{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px;margin-bottom:8px;position:relative}
.rm-link{position:absolute;top:10px;right:10px;background:rgba(255,60,60,0.2);border:none;color:#ff6b6b;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;font-family:inherit}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:1rem 0}
.error{color:#ff6b6b;font-size:13px;margin-top:6px}
.success{color:#4ade80;font-size:13px;margin-top:6px}
.badge{display:inline-block;background:rgba(167,139,250,0.2);border:1px solid var(--accent);color:#c4b5fd;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
.admin-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
.admin-row:last-child{border-bottom:none}
.section-title{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.75rem}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.pop{animation:pop 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeIn 0.3s ease}
.hero-stars{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="bg-overlay"></div>
<div id="app">

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div style="text-align:center;padding-top:2.5rem;margin-bottom:1.5rem">
    <div class="logo">FlexLink ⚡</div>
    <div class="sub">Show off your socials. Built different.</div>
    <div style="display:flex;gap:10px;max-width:340px;margin:0 auto">
      <button class="btn" onclick="show('screen-signup')">Create my page</button>
      <button class="btn btn-outline" onclick="show('screen-login')">Log in</button>
    </div>
  </div>
  <div class="section-title">All profiles</div>
  <div class="profiles-grid" id="profiles-grid"></div>
  <div style="text-align:center;margin-top:2.5rem">
    <button class="btn btn-outline btn-sm" onclick="show('screen-admin-login')" style="opacity:0.35;font-size:11px">Admin</button>
  </div>
</div>

<!-- SIGNUP -->
<div class="screen" id="screen-signup">
  <div class="nav">
    <button class="back-btn" onclick="show('screen-home')"><i class="ti ti-arrow-left"></i> Back</button>
  </div>
  <div class="logo">FlexLink ⚡</div>
  <div class="sub">Create your profile</div>
  <div class="glass">
    <div class="field"><label>Username</label><input id="su-user" placeholder="e.g. sosuke" maxlength="20"/></div>
    <div class="field"><label>Password</label><input id="su-pass" type="password" placeholder="Pick a password"/></div>
    <div class="field"><label>Display name</label><input id="su-name" placeholder="Your name"/></div>
    <button class="btn" onclick="doSignup()">Create page</button>
    <div class="error" id="su-err"></div>
  </div>
  <p style="text-align:center;margin-top:1rem;font-size:13px;color:var(--muted)">Already have a page? <span style="color:var(--accent);cursor:pointer" onclick="show('screen-login')">Log in</span></p>
</div>

<!-- LOGIN -->
<div class="screen" id="screen-login">
  <div class="nav">
    <button class="back-btn" onclick="show('screen-home')"><i class="ti ti-arrow-left"></i> Back</button>
  </div>
  <div class="logo">FlexLink ⚡</div>
  <div class="sub">Welcome back 👋</div>
  <div class="glass">
    <div class="field"><label>Username</label><input id="li-user" placeholder="your username"/></div>
    <div class="field"><label>Password</label><input id="li-pass" type="password" placeholder="your password"/></div>
    <button class="btn" onclick="doLogin()">Log in</button>
    <div class="error" id="li-err"></div>
  </div>
</div>

<!-- PROFILE VIEW -->
<div class="screen" id="screen-profile">
  <div class="nav">
    <button class="back-btn" onclick="show('screen-home')"><i class="ti ti-arrow-left"></i> All profiles</button>
    <button class="edit-btn" id="edit-own-btn" style="display:none" onclick="goEditProfile()"><i class="ti ti-pencil"></i> Edit</button>
  </div>
  <div style="text-align:center">
    <div class="avatar" id="pv-avatar"><span id="pv-avatar-txt"></span></div>
    <div class="pv-name" id="pv-name"></div>
    <div class="pv-bio" id="pv-bio"></div>
  </div>
  <div id="pv-links"></div>
  <div class="like-row">
    <button class="like-btn" id="pv-like-btn" onclick="handleLike()">
      <i class="ti ti-heart" id="pv-heart"></i>
      <span id="pv-likes">Like</span>
    </button>
    <button class="share-btn" onclick="handleShare()"><i class="ti ti-copy"></i> <span id="share-txt">Share</span></button>
  </div>
</div>

<!-- EDIT PROFILE -->
<div class="screen" id="screen-edit">
  <div class="nav">
    <button class="back-btn" onclick="goViewOwn()"><i class="ti ti-arrow-left"></i> My page</button>
    <button class="btn btn-danger btn-sm" onclick="doLogout()">Log out</button>
  </div>
  <div class="section-title" style="margin-bottom:1rem">Customize your page</div>

  <div class="glass" style="margin-bottom:12px">
    <div class="section-title">Profile info</div>
    <div class="field"><label>Display name</label><input id="ed-name" maxlength="30"/></div>
    <div class="field"><label>Bio</label><textarea id="ed-bio" rows="2" maxlength="120" style="resize:none"></textarea></div>
    <div class="field">
      <label>Avatar color</label>
      <div class="color-row" id="ed-colors"></div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Profile picture (upload)</label>
      <input type="file" id="ed-avatar-upload" accept="image/*" style="font-size:13px" onchange="handleAvatarUpload(this)"/>
    </div>
  </div>

  <div class="glass" style="margin-bottom:12px">
    <div class="section-title">Background wallpaper</div>
    <div class="wallpaper-grid" id="wp-grid"></div>
    <div class="field" style="margin-top:10px;margin-bottom:0">
      <label>Upload your own wallpaper</label>
      <input type="file" id="wp-upload" accept="image/*" style="font-size:13px" onchange="handleWpUpload(this)"/>
    </div>
  </div>

  <div class="glass" style="margin-bottom:12px">
    <div class="section-title">Social links</div>
    <div id="ed-links"></div>
    <button class="btn btn-outline" onclick="addEditLink()" style="margin-bottom:0">+ Add link</button>
  </div>

  <button class="btn" onclick="saveProfile()">Save changes</button>
  <div class="success" id="ed-success"></div>
</div>

<!-- ADMIN LOGIN -->
<div class="screen" id="screen-admin-login">
  <div class="nav">
    <button class="back-btn" onclick="show('screen-home')"><i class="ti ti-arrow-left"></i> Back</button>
  </div>
  <div class="logo">Admin Panel</div>
  <div class="sub">CEO access only 👑</div>
  <div class="glass">
    <div class="field"><label>Admin password</label><input id="adm-pass" type="password" placeholder="Enter admin password"/></div>
    <button class="btn" onclick="doAdminLogin()">Enter</button>
    <div class="error" id="adm-err"></div>
    <div style="margin-top:10px;font-size:12px;color:var(--muted)">Default: <code style="color:#c4b5fd">flexlink2024</code></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="screen" id="screen-admin">
  <div class="nav">
    <button class="back-btn" onclick="show('screen-home')"><i class="ti ti-arrow-left"></i> Home</button>
    <span class="badge">👑 CEO Panel</span>
  </div>
  <div class="section-title">All users</div>
  <div class="glass" style="margin-bottom:12px"><div id="admin-users"></div></div>
  <div class="glass">
    <div class="field"><label>Change admin password</label><input id="new-adm-pass" type="password" placeholder="New password"/></div>
    <button class="btn btn-outline btn-sm" onclick="changeAdminPass()">Update password</button>
    <div class="success" id="adm-success"></div>
  </div>
</div>

</div>
<script>
const PLATFORMS=[
  {id:'instagram',label:'Instagram',icon:'ti-brand-instagram',color:'#E1306C',prefix:'https://instagram.com/'},
  {id:'tiktok',label:'TikTok',icon:'ti-brand-tiktok',color:'#69C9D0',prefix:'https://tiktok.com/@'},
  {id:'twitter',label:'X / Twitter',icon:'ti-brand-x',color:'#1DA1F2',prefix:'https://x.com/'},
  {id:'youtube',label:'YouTube',icon:'ti-brand-youtube',color:'#FF0000',prefix:'https://youtube.com/@'},
  {id:'twitch',label:'Twitch',icon:'ti-brand-twitch',color:'#9146FF',prefix:'https://twitch.tv/'},
  {id:'snapchat',label:'Snapchat',icon:'ti-brand-snapchat',color:'#FFFC00',prefix:''},
  {id:'discord',label:'Discord',icon:'ti-brand-discord',color:'#5865F2',prefix:''},
  {id:'spotify',label:'Spotify',icon:'ti-brand-spotify',color:'#1DB954',prefix:'https://open.spotify.com/user/'},
  {id:'github',label:'GitHub',icon:'ti-brand-github',color:'#aaa',prefix:'https://github.com/'},
  {id:'custom',label:'Custom Link',icon:'ti-link',color:'#888',prefix:''},
];

const WALLPAPERS=[
  {id:'w1',label:'Purple Nebula',css:'linear-gradient(135deg,#0d0221,#1a0533,#2d0b6b)'},
  {id:'w2',label:'Ocean Night',css:'linear-gradient(135deg,#000428,#004e92,#000428)'},
  {id:'w3',label:'Rose Dark',css:'linear-gradient(135deg,#1a0010,#3d0030,#1a0010)'},
  {id:'w4',label:'Forest Mist',css:'linear-gradient(135deg,#071a0f,#0d3b2b,#071a0f)'},
  {id:'w5',label:'Midnight',css:'linear-gradient(135deg,#0a0a0a,#1a1a2e,#0a0a0a)'},
  {id:'w6',label:'Neon Pink',css:'linear-gradient(135deg,#1a0020,#3d0060,#200030)'},
  {id:'w7',label:'Cyber Blue',css:'linear-gradient(135deg,#000d1a,#001f3f,#000d1a)'},
  {id:'w8',label:'Sunset Noir',css:'linear-gradient(135deg,#1a0500,#3d1500,#1a0a00)'},
  {id:'w9',label:'Anime Dark',css:'linear-gradient(135deg,#0d0d2b,#1a1a4e,#0d0d2b)'},
  {id:'w10',label:'Cherry Blossom',css:'linear-gradient(135deg,#1a000d,#3d0020,#200010)'},
  {id:'w11',label:'Galaxy',css:'linear-gradient(135deg,#020111,#191621,#020111)'},
  {id:'w12',label:'Emerald Night',css:'linear-gradient(135deg,#001a0d,#003320,#001a0d)'},
];

const COLORS=['#7c3aed','#db2777','#0ea5e9','#10b981','#f59e0b','#ef4444','#6366f1','#ec4899','#14b8a6','#f97316'];
const ADMIN_KEY='flexlink_admin';
const USERS_KEY='flexlink_users';
const LIKES_KEY='flexlink_likes';

let currentUser=null;
let viewingUser=null;
let editWp=null;

function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch{return {}}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}
function getLikes(){try{return JSON.parse(localStorage.getItem(LIKES_KEY)||'{}')}catch{return {}}}
function saveLikes(l){localStorage.setItem(LIKES_KEY,JSON.stringify(l))}
function getAdminPass(){return localStorage.getItem(ADMIN_KEY)||'flexlink2024'}

function setBackground(wp){
  const bg=document.getElementById('bg-layer');
  if(!wp){bg.style.background='#0d0d1a';return;}
  if(wp.startsWith('data:')||wp.startsWith('http')){
    bg.style.background=`url('${wp}') center/cover no-repeat`;
  } else {
    bg.style.background=wp;
  }
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home'){renderHome();setBackground(null);}
  if(id==='screen-admin') renderAdmin();
}

function renderHome(){
  const users=getUsers();
  const grid=document.getElementById('profiles-grid');
  const keys=Object.keys(users);
  if(!keys.length){
    grid.innerHTML='<p style="color:var(--muted);font-size:13px;grid-column:span 2">No profiles yet. Be the first!</p>';
    return;
  }
  grid.innerHTML=keys.map(u=>{
    const p=users[u];
    const likes=getLikes()[u]||0;
    const hasImg=p.avatarImg?true:false;
    return `<div class="profile-card" onclick="viewProfile('${u}')">
      <div class="mini-avatar" style="background:${p.avatarColor||'#7c3aed'}">
        ${hasImg?`<img src="${p.avatarImg}" alt=""/>`:''}
        <span style="${hasImg?'display:none':''}">${p.name?p.name.slice(0,2).toUpperCase():'??'}</span>
      </div>
      <div class="pname">@${u}</div>
      <div class="pbio">${p.bio||'No bio yet'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px"><i class="ti ti-heart" style="font-size:11px"></i> ${likes}</div>
    </div>`;
  }).join('');
}

function viewProfile(username){
  const users=getUsers();
  const p=users[username];
  if(!p) return;
  viewingUser=username;
  document.getElementById('pv-name').textContent=p.name||username;
  document.getElementById('pv-bio').textContent=p.bio||'';
  const av=document.getElementById('pv-avatar');
  const avTxt=document.getElementById('pv-avatar-txt');
  av.style.background=p.avatarColor||'#7c3aed';
  const oldImg=av.querySelector('img');
  if(oldImg) oldImg.remove();
  if(p.avatarImg){
    const img=document.createElement('img');
    img.src=p.avatarImg;
    img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%';
    av.appendChild(img);
    avTxt.textContent='';
  } else {
    avTxt.textContent=p.name?p.name.slice(0,2).toUpperCase():'??';
  }
  const wp=p.wallpaper||WALLPAPERS[0].css;
  setBackground(wp);
  const linksDiv=document.getElementById('pv-links');
  linksDiv.innerHTML=(p.links||[]).filter(l=>l.handle||l.url).map(l=>{
    const pl=PLATFORMS.find(x=>x.id===l.platform)||PLATFORMS[PLATFORMS.length-1];
    const href=l.platform==='custom'?l.url:(pl.prefix+l.handle);
    const label=l.label||(pl.label+(l.handle?` @${l.handle}`:''));
    return `<a class="link-btn" href="${href}" target="_blank" rel="noopener">
      <span class="icon-wrap" style="background:${pl.color}33"><i class="ti ${pl.icon}" style="color:${pl.color};font-size:20px"></i></span>${label}</a>`;
  }).join('');
  const likes=getLikes();
  const count=likes[username]||0;
  document.getElementById('pv-likes').textContent=count>0?count:'Like';
  const myLiked=JSON.parse(localStorage.getItem('my_liked')||'[]');
  const likeBtn=document.getElementById('pv-like-btn');
  const heart=document.getElementById('pv-heart');
  if(myLiked.includes(username)){likeBtn.classList.add('liked');heart.style.color='#ff4d6d';}
  else{likeBtn.classList.remove('liked');heart.style.color='';}
  document.getElementById('edit-own-btn').style.display=(currentUser===username)?'block':'none';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-profile').classList.add('active');
}

function handleLike(){
  const myLiked=JSON.parse(localStorage.getItem('my_liked')||'[]');
  if(myLiked.includes(viewingUser)) return;
  myLiked.push(viewingUser);
  localStorage.setItem('my_liked',JSON.stringify(myLiked));
  const likes=getLikes();
  likes[viewingUser]=(likes[viewingUser]||0)+1;
  saveLikes(likes);
  document.getElementById('pv-likes').textContent=likes[viewingUser];
  document.getElementById('pv-like-btn').classList.add('liked','pop');
  document.getElementById('pv-heart').style.color='#ff4d6d';
  setTimeout(()=>document.getElementById('pv-like-btn').classList.remove('pop'),500);
}

function handleShare(){
  const url=window.location.href.split('#')[0]+'#'+viewingUser;
  navigator.clipboard.writeText(url).catch(()=>{});
  const s=document.getElementById('share-txt');
  s.textContent='Copied!';
  setTimeout(()=>s.textContent='Share',2000);
}

function doSignup(){
  const user=document.getElementById('su-user').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const pass=document.getElementById('su-pass').value;
  const name=document.getElementById('su-name').value.trim();
  const err=document.getElementById('su-err');
  if(!user||user.length<2){err.textContent='Username must be at least 2 characters';return;}
  if(!pass||pass.length<4){err.textContent='Password must be at least 4 characters';return;}
  if(!name){err.textContent='Please enter your display name';return;}
  const users=getUsers();
  if(users[user]){err.textContent='That username is taken!';return;}
  users[user]={pass,name,bio:'',avatarColor:'#7c3aed',wallpaper:WALLPAPERS[0].css,links:[],avatarImg:''};
  saveUsers(users);
  currentUser=user;
  err.textContent='';
  goEditProfile();
}

function doLogin(){
  const user=document.getElementById('li-user').value.trim().toLowerCase();
  const pass=document.getElementById('li-pass').value;
  const err=document.getElementById('li-err');
  const users=getUsers();
  if(!users[user]||users[user].pass!==pass){err.textContent='Wrong username or password';return;}
  currentUser=user;
  err.textContent='';
  viewProfile(user);
}

function doLogout(){currentUser=null;setBackground(null);show('screen-home');}
function goViewOwn(){viewProfile(currentUser);}

function goEditProfile(){
  const users=getUsers();
  const p=users[currentUser];
  document.getElementById('ed-name').value=p.name||'';
  document.getElementById('ed-bio').value=p.bio||'';
  const colDiv=document.getElementById('ed-colors');
  colDiv.innerHTML=COLORS.map(c=>`<button class="color-dot${p.avatarColor===c?' sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></button>`).join('');
  const wpGrid=document.getElementById('wp-grid');
  wpGrid.innerHTML=WALLPAPERS.map(w=>`
    <div class="wp-thumb${p.wallpaper===w.css?' sel':''}" style="background:${w.css}" onclick="selWp('${w.id}',this,'${w.css}')" title="${w.label}"></div>`).join('');
  editWp=p.wallpaper||WALLPAPERS[0].css;
  setBackground(editWp);
  const linksDiv=document.getElementById('ed-links');
  linksDiv.innerHTML='';
  (p.links||[]).forEach(l=>addEditLinkRow(l));
  document.getElementById('ed-success').textContent='';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-edit').classList.add('active');
}

function selColor(c,el){
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}

function selWp(id,el,css){
  document.querySelectorAll('.wp-thumb').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
  editWp=css;
  setBackground(css);
}

function handleWpUpload(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editWp=e.target.result;
    setBackground(editWp);
    document.querySelectorAll('.wp-thumb').forEach(d=>d.classList.remove('sel'));
  };
  reader.readAsDataURL(file);
}

function handleAvatarUpload(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const users=getUsers();
    users[currentUser].avatarImg=e.target.result;
    saveUsers(users);
  };
  reader.readAsDataURL(file);
}

function addEditLink(){addEditLinkRow({platform:'instagram',handle:'',label:'',url:''});}
function addEditLinkRow(l){
  const div=document.createElement('div');
  div.className='link-editor';
  div.innerHTML=`<button class="rm-link" onclick="this.parentElement.remove()">×</button>
    <div class="field" style="margin-bottom:6px"><label>Platform</label>
    <select class="lnk-platform">${PLATFORMS.map(p=>`<option value="${p.id}"${l.platform===p.id?' selected':''}>${p.label}</option>`).join('')}</select></div>
    <div class="field" style="margin-bottom:6px"><label>Username / URL</label><input class="lnk-handle" value="${l.handle||l.url||''}" placeholder="your username or full link"/></div>
    <div class="field" style="margin-bottom:0"><label>Button label (optional)</label><input class="lnk-label" value="${l.label||''}" placeholder="e.g. Follow me!"/></div>`;
  document.getElementById('ed-links').appendChild(div);
}

function saveProfile(){
  const users=getUsers();
  const p=users[currentUser];
  p.name=document.getElementById('ed-name').value.trim()||p.name;
  p.bio=document.getElementById('ed-bio').value.trim();
  const selCol=document.querySelector('.color-dot.sel');
  if(selCol) p.avatarColor=selCol.style.background;
  p.wallpaper=editWp||WALLPAPERS[0].css;
  const linkRows=document.querySelectorAll('#ed-links .link-editor');
  p.links=[];
  linkRows.forEach(row=>{
    const platform=row.querySelector('.lnk-platform').value;
    const handle=row.querySelector('.lnk-handle').value.trim();
    const label=row.querySelector('.lnk-label').value.trim();
    if(handle) p.links.push({platform,handle:platform==='custom'?'':handle,url:platform==='custom'?handle:'',label});
  });
  saveUsers(users);
  const s=document.getElementById('ed-success');
  s.textContent='✅ Saved!';
  setTimeout(()=>s.textContent='',2000);
}

function doAdminLogin(){
  const pass=document.getElementById('adm-pass').value;
  if(pass!==getAdminPass()){document.getElementById('adm-err').textContent='Wrong password';return;}
  document.getElementById('adm-err').textContent='';
  show('screen-admin');
}

function renderAdmin(){
  const users=getUsers();
  const likes=getLikes();
  const div=document.getElementById('admin-users');
  const keys=Object.keys(users);
  if(!keys.length){div.innerHTML='<p style="color:var(--muted);font-size:13px">No users yet</p>';return;}
  div.innerHTML=keys.map(u=>`<div class="admin-row">
    <div>
      <div style="font-weight:600;font-family:\'Syne\',sans-serif">@${u}</div>
      <div style="font-size:12px;color:var(--muted)">${users[u].name||''} · ❤️ ${likes[u]||0}</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="viewProfile('${u}')">View</button>
      <button class="btn btn-danger btn-sm" onclick="adminDelete('${u}')">Delete</button>
    </div>
  </div>`).join('');
}

function adminDelete(u){
  if(!confirm('Delete @'+u+'?')) return;
  const users=getUsers();delete users[u];saveUsers(users);renderAdmin();
}

function changeAdminPass(){
  const p=document.getElementById('new-adm-pass').value;
  if(!p||p.length<4){document.getElementById('adm-success').textContent='Too short';return;}
  localStorage.setItem(ADMIN_KEY,p);
  document.getElementById('adm-success').textContent='Updated!';
  document.getElementById('new-adm-pass').value='';
  setTimeout(()=>document.getElementById('adm-success').textContent='',2000);
}

window.onhashchange=()=>{const h=location.hash.slice(1);if(h)viewProfile(h);};
if(location.hash)viewProfile(location.hash.slice(1));
else renderHome();
</script>
</body>
</html>
